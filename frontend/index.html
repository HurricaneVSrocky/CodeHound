<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeHound - Code Graph Visualization</title>
    <!-- Google Fonts: JetBrains Mono for Code/Tech, IBM Plex Sans for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <!-- Background Grid Pattern -->
    <div class="bg-pattern"></div>
    
    <div id="app">
      <!-- Full-screen canvas container -->
      <main id="mountNode"></main>

      <!-- Floating Header / Search Area -->
      <header class="glass-panel floating-header">
        <div class="logo">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.29 7 12 12 20.71 7"></polyline>
            <line x1="12" y1="22" x2="12" y2="12"></line>
          </svg>
          <h1>CodeHound</h1>
        </div>
        <div class="search-container">
          <div class="input-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search node (e.g. main)" />
          </div>
          <button id="searchBtn">
            <span>Render</span>
          </button>
        </div>
      </header>

      <!-- Floating Properties Panel -->
      <aside id="propertiesPanel" class="glass-panel floating-aside hidden">
        <div class="aside-header">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <h3>Properties</h3>
        </div>
        <div class="aside-content">
          <div id="nodeInfo" class="node-info-container">
            <p class="empty-state">Select a node to inspect properties</p>
          </div>
        </div>
      </aside>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
